name: Daily Tender Scan

on:
  schedule:
    - cron: '55 11 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 anthropic lxml

    - name: Run Scraper Engine
      env:
        GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: python scraper.py

    - name: Commit and push changes
      run: |
        git config --global user.name "Automated Scraper"
        git config --global user.email "actions@github.com"
        git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
        for i in 1 2 3; do
          git fetch origin
          mkdir -p /tmp/sites_backup
          cp -r sites/. /tmp/sites_backup/
          git reset --hard origin/main
          cp -r /tmp/sites_backup/. sites/
          git add sites/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            break
          fi
          git commit -m "Update daily tender snapshots" && git push && break
          echo "Push failed (attempt $i), retrying in 10s..."
          sleep 10
        done
